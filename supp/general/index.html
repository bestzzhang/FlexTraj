<!DOCTYPE html>

  <title>Generalization</title>
  <style>
    body, html
    {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }
    .row {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
      gap: 40px; /* pair 与 pair 之间的间隔 */
    }
    .pair {
      display: flex;
      flex-direction: column; /* 让标题在视频上方 */
      align-items: center;
      gap: 8px; /* 标题和视频之间的间隔 */
    }
    .videos {
      display: flex;
      gap: 8px; /* pair 内部两个视频的间隔 */
    }
    .video {
      width: 300px;
      height: 180px;
      background-color: #eee;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .video video {
      width: 100%;
      height: 100%;
      object-fit: fill; /* 填满容器 */
      display: block;
    }
    .video img {
      width: 100%;
      height: 100%;
      object-fit: fill;
      display: block;
    }
    .row-1-4 {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    .row-1-4 .left {
      margin-right: 60px; /* 左 1 和右 4 的距离 */
    }
    .row-1-4 .right {
      display: flex;
      gap: 10px; /* 右边4个之间的间距 */
    }
    .titles {
      display: flex;
      gap: 8px; /* 标题之间的间隔，与视频间隔一致 */
      width: 100%;
      justify-content: center;
    }
    
    .title {
      width: 300px;
      text-align: center;
      font-weight: bold;
      font-size: 16px;
      color: #333;
    }
  </style>
</head>
